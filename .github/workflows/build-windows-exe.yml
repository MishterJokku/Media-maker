name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build EXE
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name "Media Scene Maker" media_scene_maker.py

      - name: Zip EXE folder
        run: |
          Compress-Archive -Path "dist\Media Scene Maker\*" -DestinationPath "Media_Scene_Maker_Windows_Portable.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Media_Scene_Maker_Windows_Portable
          path: Media_Scene_Maker_Windows_Portable.zip
